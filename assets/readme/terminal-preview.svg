<svg width="960" height="500" viewBox="0 0 960 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Claude in Codex realtime preview — session metadata, per-tool progress lines, and completion summary">
  <defs>
    <linearGradient id="termBg" x1="0" y1="0" x2="960" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#13171F"/>
      <stop offset="1" stop-color="#0D1016"/>
    </linearGradient>
    <linearGradient id="termTitle" x1="0" y1="18" x2="0" y2="70" gradientUnits="userSpaceOnUse">
